<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Colors</title>
    <style>
      :root {
        --color-white-normal:   #c8c9ca;
        --color-black-normal:   #000000;
        --color-blue-normal:    #4b627c;
        --color-cyan-normal:    #61909d;
        --color-green-normal:   #b7bc54;
        --color-yellow-normal:  #f2b963;
        --color-red-normal:     #bf5345;
        --color-magenta-normal: #bc637f;

        --color-white-bright:   #dcddde;
        --color-black-bright:   #292929;
        --color-blue-bright:    #5d7a9b;
        --color-cyan-bright:    #7aa2ae;
        --color-green-bright:   #c2c76e;
        --color-yellow-bright:  #f4c47c;
        --color-red-bright:     #c96f63;
        --color-magenta-bright: #c67b93;
      }

      .bg-white-normal   { background: var(--color-white-normal); }
      .bg-black-normal   { background: var(--color-black-normal); }
      .bg-blue-normal    { background: var(--color-blue-normal); }
      .bg-cyan-normal    { background: var(--color-cyan-normal); }
      .bg-green-normal   { background: var(--color-green-normal); }
      .bg-yellow-normal  { background: var(--color-yellow-normal); }
      .bg-red-normal     { background: var(--color-red-normal); }
      .bg-magenta-normal { background: var(--color-magenta-normal); }

      .bg-white-bright   { background: var(--color-white-bright); }
      .bg-black-bright   { background: var(--color-black-bright); }
      .bg-blue-bright    { background: var(--color-blue-bright); }
      .bg-cyan-bright    { background: var(--color-cyan-bright); }
      .bg-green-bright   { background: var(--color-green-bright); }
      .bg-yellow-bright  { background: var(--color-yellow-bright); }
      .bg-red-bright     { background: var(--color-red-bright); }
      .bg-magenta-bright { background: var(--color-magenta-bright); }

      .row {
        display: flex;
      }

      .square {
        flex: 1 1 auto;
        aspect-ratio: 1 / 1;
      }
    </style>
  </head>
  <body>
    <a class="row" href="https://coolors.co/c8c9ca-000000-4b627c-61909d-b7bc54-f2b963-bf5345-bc637f">
      <span class="square bg-white-normal"></span>
      <span class="square bg-black-normal"></span>
      <span class="square bg-blue-normal"></span>
      <span class="square bg-cyan-normal"></span>
      <span class="square bg-green-normal"></span>
      <span class="square bg-yellow-normal"></span>
      <span class="square bg-red-normal"></span>
      <span class="square bg-magenta-normal"></span>
    </a>
    <a class="row" href="https://coolors.co/dcddde-292929-5d7a9b-7aa2ae-c2c76e-f4c47c-c96f63-c67b93">
      <span class="square bg-white-bright"></span>
      <span class="square bg-black-bright"></span>
      <span class="square bg-blue-bright"></span>
      <span class="square bg-cyan-bright"></span>
      <span class="square bg-green-bright"></span>
      <span class="square bg-yellow-bright"></span>
      <span class="square bg-red-bright"></span>
      <span class="square bg-magenta-bright"></span>
    </a>
  </body>
</html>
